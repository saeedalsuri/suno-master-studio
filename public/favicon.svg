<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect x="8" y="8" width="496" height="496" rx="72" fill="none" stroke="url(#glow)" stroke-width="4"/>
  <!-- S letter -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="320" font-weight="bold" fill="url(#glow)" text-anchor="middle">S</text>
  <!-- V6 badge -->
  <text x="420" y="100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2ea043" text-anchor="middle">V6</text>
</svg>
